<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>上班模拟器：摸鱼大作战</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 标题区 -->
    <div class="title-section">
      <div class="logo">🐟</div>
      <h1>上班模拟器</h1>
      <p class="subtitle">摸鱼大作战</p>
    </div>

    <!-- 主菜单 -->
    <div id="main-menu" class="card">
      <div class="form-group">
        <label for="player-name">你的名字</label>
        <input type="text" id="player-name" placeholder="输入玩家名称" maxlength="12" autocomplete="off">
      </div>

      <div class="btn-group">
        <button id="btn-create" class="btn btn-primary">
          <span>🏠</span> 创建房间
        </button>
        <div class="divider">或</div>
        <div class="join-group">
          <input type="text" id="room-code-input" placeholder="房间码（6位）" maxlength="6" style="text-transform:uppercase">
          <button id="btn-join" class="btn btn-secondary">
            <span>🚪</span> 加入
          </button>
        </div>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
    </div>

    <!-- 等待室 -->
    <div id="waiting-room" class="card hidden">
      <div class="room-header">
        <div>
          <h2>等待室</h2>
          <div class="room-code-display">
            房间码：<span id="room-code-text">------</span>
            <button id="btn-copy-code" class="btn-icon" title="复制">📋</button>
          </div>
        </div>
        <div class="player-count-badge">
          <span id="player-count">1</span>/6人
        </div>
      </div>

      <div id="player-list" class="player-list"></div>

      <div class="room-actions">
        <button id="btn-start" class="btn btn-primary hidden">
          🎮 开始游戏
        </button>
        <p id="waiting-tip" class="tip-text">等待房主开始游戏...</p>
      </div>
    </div>

    <!-- 游戏规则 -->
    <div class="rules-card">
      <h3>📖 游戏规则</h3>
      <div class="rules-grid">
        <div class="rule-item">
          <span class="rule-icon">🎮</span>
          <span>WASD/方向键移动</span>
        </div>
        <div class="rule-item">
          <span class="rule-icon">空格</span>
          <span>切换摸鱼/工作</span>
        </div>
        <div class="rule-item">
          <span class="rule-icon">F</span>
          <span>举报附近玩家</span>
        </div>
        <div class="rule-item">
          <span class="rule-icon">🐟</span>
          <span>摸鱼每秒+1分</span>
        </div>
        <div class="rule-item">
          <span class="rule-icon">👔</span>
          <span>被老板抓到-10分</span>
        </div>
        <div class="rule-item">
          <span class="rule-icon">⏱️</span>
          <span>3分钟后结算</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
